<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Music Player Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    overflow:hidden;
    color:white;
}

/* ===== VIDEO NỀN ===== */
video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
    z-index:-1;
}

/* ===== PLAYER ===== */
.player{
    width:420px;
    padding:20px;
    border-radius:25px;
    background:rgba(10,15,30,0.9);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(0,200,255,0.4);
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* ===== IMAGE BOX ===== */
.image-box{
    position:relative;
    width:100%;
    height:240px;
    border-radius:20px;
    overflow:hidden;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ===== DISC (CHỈ LỘ NỬA TRÊN) ===== */
.disc{
    position:absolute;
    width:200px;
    height:200px;
    border-radius:50%;
    bottom:-100px; /* Ẩn nửa dưới */
    left:50%;
    transform:translateX(-50%);
    background:url("disc.png") center/cover no-repeat;
    animation:spin 6s linear infinite;
    animation-play-state:paused;
    box-shadow:0 0 50px #00eaff;
    filter:drop-shadow(0 0 20px #00eaff);
}

/* Xoay */
@keyframes spin{
    from{transform:translateX(-50%) rotate(0deg);}
    to{transform:translateX(-50%) rotate(360deg);}
}

/* ===== VISUALIZER ===== */
.visualizer{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    height:45px;
    margin:15px 0;
    gap:4px;
}

.bar{
    width:4px;
    background:#00eaff;
    border-radius:3px;
    height:10px;
}

/* ===== TEXT ===== */
.song-title{
    text-align:center;
    margin-bottom:10px;
    font-weight:bold;
}

/* ===== PROGRESS ===== */
.progress{
    width:100%;
    height:6px;
    background:#333;
    border-radius:5px;
    overflow:hidden;
    cursor:pointer;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#00eaff;
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin:6px 0 12px;
}

/* ===== CONTROLS ===== */
.controls{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:15px;
}

.controls button{
    background:none;
    border:none;
    color:white;
    font-size:28px;
    cursor:pointer;
}

.controls button:hover{
    color:#00eaff;
}

/* ===== PLAYLIST ===== */
.playlist{
    max-height:120px;
    overflow-y:auto;
}

.playlist-item{
    padding:8px;
    border-radius:8px;
    cursor:pointer;
}

.playlist-item.active{
    background:rgba(0,200,255,0.4);
}
</style>
</head>
<body>

<video autoplay muted loop>
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="player">

<div class="image-box">
    <img src="maid.jpg">
    <div class="disc" id="disc"></div>
</div>

<div class="visualizer" id="visualizer"></div>

<div class="song-title" id="title">Chưa phát</div>

<div class="progress" id="progressContainer">
    <div class="progress-bar" id="progress"></div>
</div>

<div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
</div>

<div class="controls">
    <button id="prev">⏮</button>
    <button id="play">▶</button>
    <button id="next">⏭</button>
</div>

<div class="playlist"></div>

</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");
const disc = document.getElementById("disc");
const title = document.getElementById("title");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const playlistContainer = document.querySelector(".playlist");

const songs = [
{name:"Song1",src:"Song1.mp3"},
{name:"Song2",src:"Song2.mp3"},
{name:"Song3",src:"Song3.mp3"},
{name:"Song4",src:"Song4.mp3"},
{name:"Song5",src:"Song5.mp3"},
{name:"yeulmchi",src:"Song6.mp3"},
{name:"nhac8d",src:"Song7.mp3"},   
{name:"amthambene",src:"Song8.mp3"},
{name:"comaykhi",src:"Song9.mp3"},
{name:"khidayeur",src:"Song10.mp3"},
{name:"hongkong",src:"Song11.mp3"},
{name:"tintuong",src:"Song12.mp3"},
{name:"nhungcuvuilene",src:"Song13.mp3"},
];

let currentIndex = 0;

/* Render Playlist */
function renderPlaylist(){
playlistContainer.innerHTML="";
songs.forEach((song,i)=>{
const div=document.createElement("div");
div.textContent=song.name;
div.className="playlist-item";
if(i===currentIndex)div.classList.add("active");
div.onclick=()=>{
currentIndex=i;
loadSong(true);
};
playlistContainer.appendChild(div);
});
}

/* Load Song */
function loadSong(autoPlay=false){
audio.src=songs[currentIndex].src;
title.textContent=songs[currentIndex].name;
renderPlaylist();
if(autoPlay) audio.play();
}

/* Play / Pause */
playBtn.onclick=()=>{
if(!audio.src){
loadSong(true);
return;
}
if(audio.paused){
audio.play();
}else{
audio.pause();
}
};

/* Events */
audio.addEventListener("play",()=>{
playBtn.textContent="⏸";
disc.style.animationPlayState="running";
});

audio.addEventListener("pause",()=>{
playBtn.textContent="▶";
disc.style.animationPlayState="paused";
});

audio.addEventListener("ended",()=>nextBtn.click());

/* Next / Prev */
nextBtn.onclick=()=>{
currentIndex=(currentIndex+1)%songs.length;
loadSong(true);
};

prevBtn.onclick=()=>{
currentIndex--;
if(currentIndex<0)currentIndex=songs.length-1;
loadSong(true);
};

/* Time update */
audio.addEventListener("timeupdate",()=>{
if(audio.duration){
progress.style.width=(audio.currentTime/audio.duration*100)+"%";
current.textContent=format(audio.currentTime);
duration.textContent=format(audio.duration);
}
});

function format(t){
if(isNaN(t))return "0:00";
let m=Math.floor(t/60);
let s=Math.floor(t%60).toString().padStart(2,"0");
return m+":"+s;
}

/* Seek */
progressContainer.onclick=(e)=>{
audio.currentTime=(e.offsetX/progressContainer.clientWidth)*audio.duration;
};

/* Visualizer */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const src=ctx.createMediaElementSource(audio);
const analyser=ctx.createAnalyser();
src.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize=64;

const dataArray=new Uint8Array(analyser.frequencyBinCount);
const visualizer=document.getElementById("visualizer");

for(let i=0;i<32;i++){
let bar=document.createElement("div");
bar.className="bar";
visualizer.appendChild(bar);
}

const bars=document.querySelectorAll(".bar");

function animate(){
requestAnimationFrame(animate);
analyser.getByteFrequencyData(dataArray);
bars.forEach((bar,i)=>{
bar.style.height=(10+dataArray[i]/255*35)+"px";
});
}
animate();

/* Kích hoạt audio */
document.body.addEventListener("click",()=>{
ctx.resume();
},{once:true});

renderPlaylist();
</script>

</body>
</html>
